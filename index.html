<section class="leyenda">

    <div class="contenedor">

        <h2>Estado de los números</h2>

        <div class="leyenda-grid">

            <div class="leyenda-item">
                <span class="estado disponible"></span>
                <p>Disponible</p>
            </div>

            <div class="leyenda-item">
                <span class="estado pendiente"></span>
                <p>Pendiente de pago (7 días)</p>
            </div>

            <div class="leyenda-item">
                <span class="estado vendido"></span>
                <p>Vendido</p>
            </div>

        </div>

    </div>

</section>

<section class="busqueda">

    <div class="contenedor">

        <h2>Buscar número</h2>

        <input
            type="number"
            id="buscarNumero"
            min="1"
            max="500"
            placeholder="Ejemplo: 125">

    </div>

</section>

<section class="rifa">

    <div class="contenedor">

        <h2>Selecciona tu número</h2>

        <div id="gridNumeros" class="gridNumeros">

            <!-- Los números del 1 al 500 serán creados automáticamente por script.js -->

        </div>

    </div>

</section>

<div id="modal" class="modal oculto">

    <div class="modalContenido">

        <button id="cerrarModal" class="cerrar">&times;</button>

        <h2 id="tituloNumero">

            Número

        </h2>

        <label>

            Nombre completo

        </label>

        <input
            type="text"
            id="nombre"
            placeholder="Escribe tu nombre">

        <label>

            Número de teléfono

        </label>

        <input
            type="tel"
            id="telefono"
            placeholder="6861234567">

        <button id="btnApartar">

            Apartar número

        </button>

    </div>

</div>
