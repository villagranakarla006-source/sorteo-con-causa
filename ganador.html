<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ganador — Rifa con Causa</title><style>
body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Segoe UI,Arial;background:radial-gradient(circle at top left,#ffe8f1,transparent 38%),radial-gradient(circle at bottom right,#dff9fb,transparent 42%),#f8fbfc;color:#14243a;padding:20px}.card{width:min(680px,100%);background:#fff;border-radius:30px;padding:42px;text-align:center;box-shadow:0 28px 80px #14384e22}.eyebrow{text-transform:uppercase;letter-spacing:.14em;color:#07879a;font-weight:900}.number{width:210px;height:210px;border-radius:50%;display:grid;place-items:center;margin:25px auto;background:linear-gradient(135deg,#07879a,#ea2868);color:#fff;font-size:5rem;font-weight:1000}.name{font-size:2rem;margin:.2em}.muted{color:#64748b}.empty{padding:25px;border-radius:18px;background:#f0f6f7;color:#64748b}.button{display:inline-block;margin-top:18px;padding:12px 20px;border-radius:999px;background:#ea2868;color:#fff;text-decoration:none;font-weight:900}
</style></head><body><main class="card"><p class="eyebrow">Rifa con Causa</p><h1>Resultado oficial</h1><div id="result"></div><a class="button" href="index.html">Volver a la rifa</a></main>
<script src="shared/config.js"></script><script src="js/local-db.js"></script><script>
const data=window.RifaLocalDB.load(),d=(data.draws||[])[0],box=document.getElementById("result");
box.innerHTML=d?`<div class="number">${String(d.winnerNumber).padStart(3,"0")}</div><h2 class="name">${d.participantName||"Participante ganador"}</h2><p class="muted">Sorteo realizado el ${new Date(d.createdAt).toLocaleString("es-MX")}</p>`:`<div class="empty">El resultado se publicará después de realizar el sorteo oficial.</div>`;
</script></body></html>
